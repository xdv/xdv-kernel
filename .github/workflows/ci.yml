name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Clone dust compiler
        run: |
          git clone --depth 1 https://github.com/dustlang/dust.git ../dust

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: ../dust

      - name: Build Dust compiler
        run: |
          cd ../dust
          cargo build --workspace

      - name: Check xdv-kernel core sectors
        run: |
          export PATH="$PWD/../dust/target/debug:$PATH"
          for sector in xdv_boot xdv_memory xdv_cpu xdv_kernel xdv_drivers xdv_qdomain xdv_phidomain xdv_odt; do
            echo "Checking sector/$sector/src..."
            dust check "sector/$sector/src" || { echo "FAILED: $sector"; exit 1; }
          done
          echo "All 8 core sectors check OK"

      - name: Check split dependency projects
        run: |
          export PATH="$PWD/../dust/target/debug:$PATH"
          for dep in ../xdv-dal/src ../xdv-cds/src ../xdv-umf/src ../xdv-hypervisor/src ../xdv-sdbm/src; do
            echo "Checking $dep..."
            dust check "$dep" || { echo "FAILED: $dep"; exit 1; }
          done
          echo "All split dependency projects check OK"

      - name: Verify kernel contract assertions
        run: |
          grep -q "kernel_assert_boot_contract" sector/xdv_kernel/src/kernel.ds
          grep -q "kernel_assert_runtime_contract" sector/xdv_kernel/src/kernel.ds
          grep -q "kernel_assert_split_dependency_interfaces" sector/xdv_kernel/src/kernel.ds
          grep -q "split dependency interfaces stable (0.1.0)" sector/xdv_kernel/src/kernel.ds
          echo "Kernel assertion markers present"